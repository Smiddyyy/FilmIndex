<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies!</title>
    <link rel="stylesheet" href="movie.css" />
    <link rel="stylesheet" href="layout.css" />
    <link rel="stylesheet" href="filter.css" />
    <script src="index.js"></script>
</head>

<body class="sidebar-closed">
    <header>
        <button id="menu-toggle" aria-label="Open filters">☰</button>
        <h1 id="page-title">Movies!</h1>
        <div id="user-greeting"></div>
    </header>
    <main id="movie-card-container" class="scrollable">

    </main>
    <aside id="filter-sidebar">
        <div id="sidebar-header">
            <button id="close-sidebar" aria-label="Close filters">×</button>
        </div>
        <div id="search-filter">
            <div>
                <input type="text" id="search-input" placeholder="Search by title" />
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-search" viewBox="0 0 16 16">
                <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"/>
                </svg>
            </div>
        </div>
        <div id="genre-filters">
            <h2>Genres:</h2>
            <div id="active-filters"></div>
            <hr>
            <div id="available-filters"></div>
        </div>
        <div id="manage">
            <!-- TODO -->
            <button id="searchBtn">Search</button> 
            <button id="authBtn">Logout</button>
        </div>
    </aside>
    <footer>
        <p>© 2026 Movies! &nbsp; - &nbsp; Written by Tobias Schmidt</p>
    </footer>

    <!-- Login Dialog -->
    <dialog id="loginDialog">
      <form id="loginForm">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required>
        <button type="submit">Login</button>
      </form>
    </dialog>

    <!-- Search Dialog -->
    <dialog id="searchDialog">
        <!-- TODO -->
    </dialog>

</body>
</html>
