<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies!</title>
    <style>
        html {
            font-size: 90%;
        }

        body {
            background: #C0BFF8;
            color: #eee;
        }

        #page-title {
            text-align: center;
            margin: 40px auto 20px;
            font-family: Inter, system-ui, sans-serif;
            color: #111827;
        }

        #movie-card-container {
            max-width: 95%;
            margin: 20px auto;
            display: flex;
            flex-wrap: wrap;
            justify-content: left;
        }

        /* movie card container */
        .movie-card {
            width: 260px;
            min-width: 260px;
            margin: 5px;
            padding: 16px;
            border-radius: 12px;
            background: #ffffff;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            font-family: Inter, system-ui, sans-serif;
            color: #111827;
            backdrop-filter: blur(6px);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .movie-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }

        .movie-card header h2 {
            margin: 0 0 12px;
            font-size: 1.4rem;
            line-height: 1.2;
        }

        .img-wrapper {
            max-width: 200px;
            height: 250px;
            margin: 0 auto;
            /* hides zoom overflow */
            overflow: hidden;
            border-radius: 14px;
        }

        .img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top;
            transform-origin: top center;
            transition: transform 0.3s ease;
        }

        .img-wrapper:hover img {
            /* zoom effect */
            transform: scale(1.1);
        }

        .img-wrapper {
            position: relative;
        }

        .img-wrapper::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.1);
        }

        .movie-card p {
            margin: 0 0 14px;
            color: #4b5563;
            line-height: 1.5;
            font-size: 0.95rem;
        }

        /* movie details section */
        .movie-card p.movie-details {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            letter-spacing: 0.02em;
            color: #777;
            margin: 0.5rem 0;
        }

        .movie-card p.movie-details .label {
            font-weight: 600;
            color: #555;
        }

        .movie-card p.movie-details .value {
            font-weight: 400;
        }

        .movie-card p.movie-details .separator {
            margin: 0 8px;
            color: #aaa;
        }

        /* plot summary */
        .movie-plot {
            max-height: 110px;
            overflow-y: auto;
            /* space for scrollbar */
            padding-right: 8px;
            opacity: 0.7;
            font-size: 0.9rem;
        }

        /* ratings section */
        .movie-ratings {
            display: flex;
            justify-content: left;
            gap: 8px;
            margin: auto 0 5px;
        }

        .rating-badge {
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.02em;

            background: #f0ece0;
            color: #374151;
        }

        /* genre tags */
        .genre-tag {
            display: inline-block;
            margin: 0 8px 8px 0;
            padding: 6px 12px;
            border-radius: 999px;
            background: #dfdcef;
            color: #374151;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .movie-card hr {
            border: 0;
            height: 1px;
            background: #e5e7eb;
            margin: 10px 0;
        }

        /* tablist container */
        .credits-tablist {
            display: flex;
            gap: 8px;
            padding: 3px;
            margin-bottom: 5px;
            background: #f3f4f6;
            color: #374151;
            border-radius: 14px;
            width: fit-content;
        }

        /* tabs */
        .credits-tab-button {
            border: 0;
            background: transparent;
            color: #4b5563;
            padding: 4px 14px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease;
        }

        .credits-tab-button:hover {
            background: rgba(255, 255, 255, 0.7);
            color: #111827;
        }

        .credits-tab-button[aria-selected="true"] {
            background: #d0cae8;
            color: #111827;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
        }

        /* panels */
        .credits-panel {
            padding: 5px 14px 10px;
            font-size: 0.9em;
            border-radius: 14px;
            background: #f9fafb;
            border: 1px solid #e5e7eb;
        }

        .credits-panel h2 {
            font-size: 0.9rem;
            margin: 0px;
        }

        .credits-panel ul {
            margin: 0;
            padding-left: 18px;
        }

        .credits-panel li {
            color: #374151;
        }

        /* custom scrollbar */
        .scrollable::-webkit-scrollbar {
            width: 8px;
        }

        .scrollable::-webkit-scrollbar-track {
            background: transparent;
        }

        .scrollable::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 10px;
        }

        .scrollable::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 0, 0, 0.4);
        }

        .scrollable {
            position: relative;
        }

        .scrollable::after {
            content: "";
            position: sticky;
            bottom: 0;
            display: block;
            height: 30px;

            background: linear-gradient(to bottom, transparent, #fafafa);
        }
    </style>
    <script>
        window.onload = function () {
            const xhr = new XMLHttpRequest()
            xhr.onload = function () {
                const bodyElement = document.querySelector("body");

                if (xhr.status == 200) {
                    const movies = JSON.parse(xhr.responseText);

                    const mainElement = document.createElement("main");

                    const pageTitle = document.createElement("h1");
                    pageTitle.id = "page-title";
                    pageTitle.textContent = "Movie List";

                    const movieCardContainer = document.createElement("div");
                    movieCardContainer.id = "movie-card-container";

                    mainElement.append(pageTitle);
                    mainElement.append(movieCardContainer);


                    movies.forEach((movie, movieIndex) => {
                        const article = document.createElement("article");
                        article.classList.add("movie-card"); // Add a class for styling

                        const header = document.createElement("header");

                        const title = document.createElement("h2");
                        title.textContent = movie.title;

                        header.append(title);
                        article.append(header);

                        // Poster image

                        const imgwrapper = document.createElement("div");
                        imgwrapper.classList.add("img-wrapper");

                        const poster = document.createElement("img");
                        poster.src = movie.poster;
                        poster.alt = "Poster of " + movie.title;
                        poster.width = 200;

                        imgwrapper.append(poster);
                        article.append(imgwrapper);

                        // Details as simple text
                        const detailsText = document.createElement("p");
                        detailsText.classList.add("movie-details");
                        detailsText.innerHTML = `
                            <span class="label">Runtime</span> 
                            <span class="value">${movie.runtime} min</span>
                            <span class="separator">|</span>
                            <span class="label">Released</span> 
                            <span class="value">${movie.released}</span>
                            `;
                        article.append(detailsText);

                        // Genres as tags
                        const genres = document.createElement("div");
                        movie.genres.forEach(genre => {
                            const genreSpan = document.createElement("span");
                            genreSpan.textContent = genre;
                            genreSpan.classList.add("genre-tag"); // Add a class for styling
                            genres.append(genreSpan);
                        });
                        article.append(genres);

                        // Plot summary
                        const plot = document.createElement("p");
                        plot.classList.add("movie-plot");
                        plot.classList.add("scrollable");
                        plot.textContent = movie.plot;
                        article.append(plot);

                        // Ratings as pills
                        const ratingsText = document.createElement("div");
                        ratingsText.classList.add("movie-ratings");
                        ratingsText.innerHTML = `
                        <span class="rating-badge imdb">IMDb ${movie.imdbRating}/10</span>
                        <span class="rating-badge metascore">Metascore ${movie.metascore}</span>
                        `;
                        article.append(ratingsText);


                        // Credits section with tabs
                        // Create tablist container
                        const tablist = document.createElement("div");
                        tablist.classList.add("credits-tablist");
                        tablist.setAttribute("role", "tablist");
                        tablist.setAttribute("aria-label", "Movie Credits");

                        // Define tabs with data
                        const tabs = [
                            { id: "directors", label: "Directors", items: movie.directors },
                            { id: "writers", label: "Writers", items: movie.writers },
                            { id: "stars", label: "Stars", items: movie.actors }
                        ];

                        // Create all tab buttons
                        const panels = [];
                        tabs.forEach((tab, index) => {
                            const button = document.createElement("button");
                            button.id = `tab-${movieIndex}-${tab.id}`;
                            button.classList.add("credits-tab-button");
                            button.setAttribute("role", "tab");
                            button.setAttribute("aria-controls", `panel-${movieIndex}-${tab.id}`);
                            button.setAttribute("aria-selected", index === 0 ? "true" : "false");
                            button.setAttribute("tabindex", index === 0 ? "0" : "-1");
                            button.textContent = tab.label;

                            tablist.append(button);

                            // Create corresponding panel
                            const panel = document.createElement("section");
                            panel.id = `panel-${movieIndex}-${tab.id}`;
                            panel.classList.add("credits-panel");
                            panel.setAttribute("role", "tabpanel");
                            panel.setAttribute("aria-labelledby", `tab-${movieIndex}-${tab.id}`);
                            if (index !== 0) {
                                panel.setAttribute("hidden", "");
                            }

                            const heading = document.createElement("h2");
                            heading.textContent = tab.label;
                            panel.append(heading);

                            const list = document.createElement("ul");
                            tab.items.forEach(item => {
                                const listItem = document.createElement("li");
                                listItem.textContent = item;
                                list.append(listItem);
                            });
                            panel.append(list);

                            panels.push({ button, panel });
                        });

                        // Set up click handlers for tab switching
                        panels.forEach(({ button, panel }) => {
                            button.addEventListener("click", () => {
                                // Deactivate all tabs and panels
                                panels.forEach(({ button: btn, panel: pnl }) => {
                                    btn.setAttribute("aria-selected", "false");
                                    btn.setAttribute("tabindex", "-1");
                                    pnl.setAttribute("hidden", "");
                                });

                                // Activate clicked tab and its panel
                                button.setAttribute("aria-selected", "true");
                                button.setAttribute("tabindex", "0");
                                panel.removeAttribute("hidden");
                            });
                        });

                        article.append(document.createElement("hr")); // Add a horizontal rule for separation
                        article.append(tablist);
                        panels.forEach(({ panel }) => article.append(panel));

                        movieCardContainer.append(article);
                    });

                    bodyElement.append(mainElement);
                } else {
                    const errorMessage = document.createElement("p");
                    errorMessage.textContent =
                        "Daten konnten nicht geladen werden, Status " +
                        xhr.status +
                        " - " +
                        xhr.statusText;
                    bodyElement.append(errorMessage);
                }
            };

            xhr.open("GET", "/movies");
            xhr.send();
        }
    </script>

</head>

<body>
</body>

</html>
